spark:
  app_name: "RealTimeLogMonitoring"
  master: "local[*]"
  driver:
    memory: "2g"
    cores: 2
  executor:
    memory: "2g"
    cores: 2
    instances: 1
  sql:
    shuffle_partitions: 4
    adaptive_execution_enabled: true
  streaming:
    checkpoint_location: "checkpoint/logs"
    trigger_interval_seconds: 5
    window_duration_seconds: 60
    slide_duration_seconds: 10
    timeout_ms: 60000
  rdd:
    compression_codec: "org.apache.spark.io.SnappyCompressionCodec"

logging:
  level: "WARN"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

processing:
  batch_size: 1000
  max_partitions: 8
  enable_caching: true
  output_mode: "append"  # or "complete" for stateful operations

hdfs:
  enabled: false
  namenode: "hdfs://localhost:9000"
  user: "hdfs"
  path_prefix: "/logs"
